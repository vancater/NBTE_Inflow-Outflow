<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Efficiency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #1a1a2e; background: #f8fafc; }
        .form-label { font-weight: 500; font-size: 0.82rem; color: #374151; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width:640px;">
    <div class="mb-3 pb-2" style="border-bottom:2px solid #198754;">
        <h5 class="mb-0 fw-bold" style="color:#198754;"><i class="bi bi-plus-circle me-2"></i>Add Efficiency</h5>
    </div>
    <form method="post" id="addEfficiencyForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Year</label>
            <select name="year" class="form-select" required>
                {% for y in range(2025, 2030) %}
                <option value="{{ y }}">{{ y }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Project Title</label>
            <input type="text" name="project_title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Generated Capacity</label>
            <input type="text" name="generated_capacity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="project_type" class="form-select" required>
                <option value="AI Agent">AI Agent</option>
                <option value="Automation">Automation</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select" required>
                <option value="Initiation">Initiation</option>
                <option value="Development">Development</option>
                <option value="Testing">Testing</option>
                <option value="Implementation">Implementation</option>
                <option value="Post-Implementation">Post-Implementation</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Content Process</label>
            <input type="text" name="content_process" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Project Owner</label>
            <input type="text" name="project_owner" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Planned Deployment</label>
            <input type="hidden" name="planned_deployment" id="planned_deployment">
            <div class="row g-2">
                <div class="col-6">
                    <select id="planned_deployment_year" class="form-select" required>
                        {% for y in range(2025, 2031) %}
                        <option value="{{ y }}">{{ y }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6">
                    <select id="planned_deployment_quarter" class="form-select" required>
                        <option value="Q1">Q1</option>
                        <option value="Q2">Q2</option>
                        <option value="Q3">Q3</option>
                        <option value="Q4">Q4</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Savings</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="text" name="savings" class="form-control" placeholder="0.00">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Team</label>
            <select name="team" class="form-select" required>
                <option value="Entity">Entity</option>
                <option value="GNS">GNS</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Domestic/REPH</label>
            <input type="text" name="domestic_reph" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">GPTRAC</label>
            <input type="text" name="gptrac" class="form-control">
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-success btn-sm px-4"><i class="bi bi-check2 me-1"></i>Add</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="window.parent.postMessage('closeModal', '*')">Cancel</button>
        </div>
    </form>
</div>
<script>
window.addEventListener('message', function(event) {
    if (event.data === 'closeModal') {
        window.close();
    }
});
// Close modal on successful submit
const form = document.getElementById('addEfficiencyForm');

function updatePlannedDeploymentValue() {
    const yearEl = document.getElementById('planned_deployment_year');
    const quarterEl = document.getElementById('planned_deployment_quarter');
    const plannedDeploymentEl = document.getElementById('planned_deployment');
    if (!yearEl || !quarterEl || !plannedDeploymentEl) return;
    plannedDeploymentEl.value = `${yearEl.value}-${quarterEl.value}`;
}

document.getElementById('planned_deployment_year').addEventListener('change', updatePlannedDeploymentValue);
document.getElementById('planned_deployment_quarter').addEventListener('change', updatePlannedDeploymentValue);
updatePlannedDeploymentValue();

form.addEventListener('submit', function() {
    updatePlannedDeploymentValue();
    setTimeout(function() {
        window.parent.postMessage('closeModal', '*');
    }, 100);
});
</script>
</body>
</html>
